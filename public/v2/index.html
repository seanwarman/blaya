<!DOCTYPE html>
<html lang="en">
  <script type="importmap">
    {
      "imports": {
        "vue": "/node_modules/vue/dist/vue.esm-browser.js",
        "io": "/node_modules/socket.io/client-dist/socket.io.esm.min.js",
        "pinia": "/node_modules/pinia/dist/pinia.esm-browser.js",
        "vue-demi": "/node_modules/vue-demi/lib/index.mjs",
        "@vue/devtools-api": "/node_modules/@vue/devtools-api/lib/esm/index.js",
        "@vueuse/gesture": "/node_modules/@vueuse/gesture/dist/index.mjs",
        "fzf": "/node_modules/fzf/dist/fzf.es.js",
        "@stores/": "./stores/",
        "@helpers": "../helpers/index.js",
        "@helpers/": "../helpers/",
        "@components/": "./components/"
      }
    }
  </script>
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <head>
    <meta charset="UTF-8">
    <title>Blaya</title>
    <link href="./index.css" rel="stylesheet" />
  </head>
  <body
    id="app"
    data-searching="false"
    data-uploading="false"
    data-downloading="false"
    data-playlist-minimised="true"
    data-show-track-loader="false"
    data-show-sequencer="false"
    data-slice-mode="off"
    data-selector-active="true"
    data-playlist-mode="false"
  >
    <header>
      <toolbar
        stylesheet="./components/Toolbar.css"
      ></toolbar>
    </header>
    <main>
      <track-list
        stylesheet="./components/TrackList.css"
      ></track-list>
    </main>
    <aside>
      <playlists
        stylesheet="./components/Playlists.css"
      ></playlists>
    </aside>
    <footer>
      <audio-controls
        stylesheet="./components/AudioControls.css"
      ></audio-controls>
    </footer>
  </body>
  <script type="module">
    import { createApp } from 'vue';
    import { createPinia } from 'pinia';
    import io from 'io';
    import { GesturePlugin } from '@vueuse/gesture';
    import { usePlaylistStore, playlistSubscription } from '@stores/playlist';

    import Toolbar from '@components/Toolbar';
    import TrackList from '@components/TrackList';
    import AudioControls from '@components/AudioControls';
    import Playlists from '@components/Playlists';

    const app = createApp({ components: {
      Toolbar,
      TrackList,
      AudioControls,
      Playlists,
    }});

    app.use(createPinia());
    app.use(GesturePlugin)
    usePlaylistStore().$subscribe(playlistSubscription);
    app.mount('#app');

    io().on('RELOAD', () => window.location.reload())
  </script>
</html>
